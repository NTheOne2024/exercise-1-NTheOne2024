<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        /* Part 3: Your styling goes here */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        article {
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 700px;
        }

        h2 {
            margin-top: 0;
        }

        img {
            max-width: 200px;
            border-radius: 8px;
            display: block;
            margin-bottom: 10px;
        }

        .genre {
            background-color: #d0eaff;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
            margin-right: 6px;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        p {
            line-height: 1.4;
        }
    </style>
    <script>
        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
		            /* Part 2: Build the HTML elements here and append them to the body */ 
                    const movies = JSON.parse(xhr.responseText);

                    movies.forEach(movie => {
                        const article = document.createElement("article");

                        const title = document.createElement("h2");
                        title.textContent = movie.Title;

                        const poster = document.createElement("img");
                        poster.src = movie.Poster;
                        poster.alt = movie.Title;

                        const released = document.createElement("p");
                        released.textContent = "Released: " + movie.Released;

                        const runtime = document.createElement("p");
                        runtime.textContent = "Runtime: " + movie.Runtime + " min";

                        const genres = document.createElement("div");
                        movie.Genres.forEach(g => {
                            const span = document.createElement("span");
                            span.classList.add("genre");
                            span.textContent = g;
                            genres.appendChild(span);
                        });

                        const people = document.createElement("p");
                        people.innerHTML =
                            "<strong>Directors:</strong> " + movie.Directors.join(", ") + "<br>" +
                            "<strong>Writers:</strong> " + movie.Writers.join(", ") + "<br>" +
                            "<strong>Actors:</strong> " + movie.Actors.join(", ");

                        const ratings = document.createElement("p");
                        ratings.textContent = "Metascore: " + movie.Metascore + " — IMDb: " + movie.imdbRating;

                        const plot = document.createElement("p");
                        plot.textContent = movie.Plot;

                        article.appendChild(title);
                        article.appendChild(poster);
                        article.appendChild(released);
                        article.appendChild(runtime);
                        article.appendChild(genres);
                        article.appendChild(people);
                        article.appendChild(ratings);
                        article.appendChild(plot);

                        bodyElement.appendChild(article);
                    });

                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
</body>

</html>
